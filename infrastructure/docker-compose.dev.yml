name: sgpt-dev

services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: bale_bot
      POSTGRES_PASSWORD: dev_password
      POSTGRES_DB: bale_bot
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bale_bot"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile
    volumes:
      - ../backend:/app
      - /app/.venv
      - user_memories:/app/user_memories
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://bale_bot:dev_password@db:5432/bale_bot
      - DEBUG=true
      - ENVIRONMENT=development
      - LOG_LEVEL=DEBUG
      - LOG_FORMAT=text
      - PYTHONPATH=/app/src
      - USER_MEMORIES_DIR=/app/user_memories
    depends_on:
      db:
        condition: service_healthy
    working_dir: /app/src
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  pgadmin:
    image: dpage/pgadmin4:latest
    entrypoint: >
      /bin/sh -c "
      echo 'db:5432:*:bale_bot:dev_password' > /tmp/pgpass &&
      chmod 600 /tmp/pgpass &&
      /entrypoint.sh
      "
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_ALLOW_SPECIAL_EMAIL_DOMAINS: "['local']"
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
      PGADMIN_CONFIG_UPGRADE_CHECK_ENABLED: "False"
      PGADMIN_CONFIG_SESSION_COOKIE_SECURE: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin-servers.json:/pgadmin4/servers.json:ro
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  pgadmin_data:
  user_memories:
