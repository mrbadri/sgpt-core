services:
  db:
    image: postgres:18-alpine
    # environment:
    #   POSTGRES_USER: ${POSTGRES_USER}
    #   POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    #   POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql
    env_file:
      - ../.env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bale_bot"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - backend_network

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8800:8000"
    env_file:
      - ../.env
    environment:
      # - DATABASE_URL=${DATABASE_URL}
      - DEBUG=false
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO
      - LOG_FORMAT=json
      # - BALE_BOT_TOKEN=${BALE_BOT_TOKEN}
      # - BALE_API_URL=${BALE_API_URL:-https://tapi.bale.ai/bot{0}/{1}}
      # - BALE_BOT_PHONE=${BALE_BOT_PHONE:-}
      # - ADMIN_SECRET_KEY=${ADMIN_SECRET_KEY}
      # - SECRET_KEY=${SECRET_KEY}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    working_dir: /app
    networks:
      - backend_network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

volumes:
  postgres_data:

networks:
  backend_network:
    driver: bridge
